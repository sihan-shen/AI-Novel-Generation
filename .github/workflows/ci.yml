name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[test,dev]"

      - name: Run ruff
        run: |
          source .venv/bin/activate
          ruff check app tests

      - name: Run mypy
        run: |
          source .venv/bin/activate
          mypy app

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          pytest tests/ -q --tb=no --cov=app --cov-fail-under=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novel-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: novel-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run tests
        run: npm run test -- --run
