[project]
name = "ai-novel-generation"
version = "0.1.0"
description = "LLM-assisted novel writing tool"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "sqlalchemy>=2.0.30",
    "python-dotenv>=1.0.1",
    "jinja2>=3.1.3",
    "anthropic>=0.39.0",
    "openai>=1.30.0",
    "aiofiles>=23.2.1",
    "python-multipart>=0.0.9",
    "pydantic-settings>=2.2.0",
]

[tool.ruff]
line-length = 100
