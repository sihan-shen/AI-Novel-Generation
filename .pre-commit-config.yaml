repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: ["check", "app", "tests"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5.0
          - pydantic-settings>=2.2.0
          - fastapi>=0.110.0
          - sqlalchemy>=2.0.30
          - types-PyYAML
        args: ["app"]

  - repo: local
    hooks:
      - id: biome
        name: biome
        entry: bash -c 'cd novel-frontend && npx biome check --write .'
        language: system
        files: ^novel-frontend/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false
