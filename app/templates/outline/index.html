{% extends "base.html" %}

{% block title %}{{ project.title }} - 大纲{% endblock %}

{% block content %}
<div class="animate-slide-up" style="max-width: 960px; margin: 0 auto;">
    <div class="page-header" style="border-bottom: none; padding-bottom: 0; margin-bottom: 1.5rem;">
        <div>
            <a href="/projects/{{ project.id }}" style="font-size: 0.8125rem; color: var(--text-tertiary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem; margin-bottom: 0.375rem; transition: color var(--transition);"
               onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color=''">← 返回项目</a>
            <h1 class="heading-xl" style="margin: 0;">{{ project.title }} — 大纲</h1>
        </div>
        <div class="page-header-actions">
            <button hx-get="/project/{{ project.id }}/outline/new-item"
                    hx-target="#outline-form-container" hx-swap="innerHTML"
                    class="btn btn-primary">
                + 添加章节
            </button>
        </div>
    </div>

    <div id="outline-form-container"></div>

    <div id="outline-tree" class="card" style="padding: 1rem;"
         hx-get="/project/{{ project.id }}/outline/tree" hx-trigger="load" hx-swap="innerHTML">
    </div>
</div>
{% endblock %}
