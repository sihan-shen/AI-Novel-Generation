<div class="modal-overlay">
    <div class="modal-content" style="width: 100%; max-width: 440px; padding: 1.75rem;" onclick="event.stopPropagation()">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <h2 class="heading" style="margin: 0;">{{ "编辑" if is_edit else "新建" }}大纲项</h2>
            <button type="button" onclick="this.closest('.modal-overlay').remove()"
                    class="btn-icon">✕</button>
        </div>
        <form hx-post="{{ post_url }}" hx-target="#outline-tree" hx-swap="innerHTML">
            {% if parent_id %}
            <input type="hidden" name="parent_id" value="{{ parent_id }}">
            {% endif %}
            <input type="hidden" name="level" value="{{ level }}">
            <div style="margin-bottom: 1rem;">
                <label class="input-label">标题 *</label>
                <input type="text" name="title" value="{{ item.title if item else '' }}" required class="input">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label class="input-label">摘要</label>
                <textarea name="summary" rows="3" class="input">{{ item.summary if item else '' }}</textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button type="button" onclick="this.closest('.modal-overlay').remove()" class="btn btn-ghost">取消</button>
                <button type="submit" class="btn btn-primary">{{ "保存" if is_edit else "创建" }}</button>
            </div>
        </form>
    </div>
</div>
