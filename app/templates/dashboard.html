{% extends "base.html" %}
{% block title %}项目 - Novel Forge{% endblock %}
{% block content %}
<div class="page-header animate-slide-up">
    <div>
        <h1 class="page-header-title">我的项目</h1>
        <p class="page-header-sub">继续你的创作之旅</p>
    </div>
    <div class="page-header-actions">
        <button class="btn btn-primary" hx-get="/projects/new" hx-target="body" hx-swap="beforeend">
            <span>+</span> 新建项目
        </button>
    </div>
</div>

<div id="project-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 stagger-children"
     hx-get="/projects/list" hx-trigger="load" hx-swap="innerHTML">
    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem 0;">
        <div style="color: var(--text-tertiary); font-size: 0.875rem;">加载中...</div>
    </div>
</div>
{% endblock %}
