{% for item in settings %}
<div class="card-elevated animate-in animate-in-{{ loop.index if loop.index <= 6 else 6 }}" style="padding: 1rem;">
    <div style="display: flex; align-items: flex-start; justify-content: space-between;">
        <div style="flex: 1; min-width: 0;">
            <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                <span class="heading-sm" style="margin: 0;">{{ item.name }}</span>
                <span class="badge" style="background: var(--bg-hover); color: var(--text-tertiary);">{{ item.category }}</span>
                {% if item.weight >= 7 %}<span class="badge badge-warning">★核心</span>{% endif %}
                {% if item.status == 'deprecated' %}<span class="badge badge-danger">已废弃</span>{% endif %}
            </div>
            {% if item.summary %}
            <p style="font-size: 0.8125rem; color: var(--text-secondary); margin-top: 0.375rem; line-height: 1.5;">{{ item.summary }}</p>
            {% endif %}
        </div>
        <div style="display: flex; gap: 0.25rem; margin-left: 0.75rem; flex-shrink: 0;">
            <button hx-get="/project/{{ project_id }}/settings/{{ item.id }}"
                    hx-target="body" hx-swap="beforeend"
                    class="btn btn-ghost btn-sm">查看</button>
            <button hx-delete="/project/{{ project_id }}/settings/{{ item.id }}"
                    hx-target="#settings-list" hx-confirm="删除「{{ item.name }}」？"
                    class="btn btn-danger btn-sm">✕</button>
        </div>
    </div>
</div>
{% else %}
<div class="empty-state" style="grid-column: 1 / -1;">
    <span class="empty-state-icon">🌍</span>
    <div class="empty-state-title">暂无设定条目</div>
    <p class="empty-state-desc" style="margin-top: 0.375rem;">选择一个分类后点击添加</p>
</div>
{% endfor %}
