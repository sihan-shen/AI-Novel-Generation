<div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-lg shadow-xl" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold">🧹 打扫报告</h2>
            <button onclick="this.closest('#modal').remove()" class="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div class="space-y-4 text-sm">
            <div>
                <h3 class="font-semibold text-amber-700">基础清扫</h3>
                <p>发现 <strong>{{ basic.orphans|length }}</strong> 个孤立条目</p>
                {% if basic.orphans %}
                <ul class="list-disc list-inside text-gray-600 mt-1">
                    {% for o in basic.orphans %}
                    <li>{{ o.name }} ({{ o.category }})</li>
                    {% endfor %}
                </ul>
                {% endif %}
                <p>发现 <strong>{{ basic.empty|length }}</strong> 个空条目</p>
            </div>
            <div>
                <h3 class="font-semibold text-green-700">深度清理</h3>
                <p>已归档 <strong>{{ deep.archived|length }}</strong> 个废弃条目</p>
            </div>
        </div>
    </div>
</div>
