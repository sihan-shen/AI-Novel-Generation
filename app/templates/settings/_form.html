<div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-xl" onclick="event.stopPropagation()">
        <h2 class="text-lg font-bold mb-4">{% if is_edit %}编辑{% else %}添加{% endif %}设定条目</h2>
        <form hx-post="{{ post_url }}" hx-target="#settings-list" hx-swap="innerHTML">
            <input type="hidden" name="category" value="{{ category }}">
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">名称 *</label>
                <input type="text" name="name" value="{{ item.name if item else '' }}" required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">概要</label>
                <input type="text" name="summary" value="{{ item.summary if item else '' }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">重要度 (1-10)</label>
                <input type="number" name="weight" value="{{ item.weight if item else 5 }}" min="1" max="10"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">详细描述</label>
                <textarea name="content" rows="5"
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">{{ item.content if item else '' }}</textarea>
            </div>
            <div class="flex justify-end gap-2">
                <button type="button" onclick="this.closest('#modal').remove()"
                        class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">取消</button>
                <button type="submit" class="px-4 py-2 text-sm bg-primary-600 text-white rounded-lg hover:bg-primary-700">保存</button>
            </div>
        </form>
    </div>
</div>
