<div class="modal-overlay">
    <div class="modal-content" style="width: 100%; max-width: 500px; padding: 1.75rem;" onclick="event.stopPropagation()">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <h2 class="heading" style="margin: 0;">{% if is_edit %}编辑{% else %}添加{% endif %}设定条目</h2>
            <button type="button" onclick="this.closest('.modal-overlay').remove()"
                    class="btn-icon">✕</button>
        </div>
        <form hx-post="{{ post_url }}" hx-target="#settings-list" hx-swap="innerHTML">
            <input type="hidden" name="category" value="{{ category }}">
            <div style="margin-bottom: 1rem;">
                <label class="input-label">名称 *</label>
                <input type="text" name="name" value="{{ item.name if item else '' }}" required class="input">
            </div>
            <div style="margin-bottom: 1rem;">
                <label class="input-label">概要</label>
                <input type="text" name="summary" value="{{ item.summary if item else '' }}" class="input">
            </div>
            <div style="margin-bottom: 1rem;">
                <label class="input-label">重要度 (1-10)</label>
                <input type="number" name="weight" value="{{ item.weight if item else 5 }}" min="1" max="10" class="input">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label class="input-label">详细描述</label>
                <textarea name="content" rows="5" class="input">{{ item.content if item else '' }}</textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button type="button" onclick="this.closest('.modal-overlay').remove()" class="btn btn-ghost">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
