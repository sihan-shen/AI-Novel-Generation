<div class="modal-overlay">
    <div class="modal-content" style="width: 100%; max-width: 480px; padding: 1.5rem;" onclick="event.stopPropagation()">
        <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem;">
            <h2 style="font-size: 1.125rem; font-weight: 700;">{{ setting.name }}</h2>
            <button onclick="this.closest('.modal-overlay').remove()" style="background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 1.25rem; padding: 0.25rem;">✕</button>
        </div>
        <div style="font-size: 0.875rem; display: flex; flex-direction: column; gap: 0.75rem;">
            <div><span style="color: var(--text-secondary);">分类：</span>{{ setting.category }}</div>
            {% if setting.summary %}<div><span style="color: var(--text-secondary);">概要：</span>{{ setting.summary }}</div>{% endif %}
            {% if setting.weight %}<div><span style="color: var(--text-secondary);">重要度：</span>{{ setting.weight }}/10</div>{% endif %}
            <div><span style="color: var(--text-secondary);">状态：</span>{{ setting.status }}</div>
            {% if setting.content %}
            <div>
                <span style="color: var(--text-secondary);">详细内容：</span>
                <div style="margin-top: 0.375rem; padding: 0.75rem; background: var(--bg); border-radius: 8px; white-space: pre-wrap; font-size: 0.8125rem;">{{ setting.content }}</div>
            </div>
            {% endif %}
        </div>
    </div>
</div>
