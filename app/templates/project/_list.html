{% for project in projects %}
<div class="card-elevated animate-in animate-in-{{ loop.index if loop.index <= 6 else 6 }}" style="padding: 1.25rem;">
    <div style="display: flex; align-items: flex-start; justify-content: space-between;">
        <div style="flex: 1; min-width: 0;">
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                <a href="/projects/{{ project.id }}" class="heading-sm" style="text-decoration: none; transition: color var(--transition);"
                   onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color=''">
                    {{ project.title }}
                </a>
                {% if project.genre %}<span class="badge">{{ project.genre }}</span>{% endif %}
            </div>
            {% if project.description %}
            <p style="font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; margin-top: 0.375rem;" class="clamp-2">
                {{ project.description }}
            </p>
            {% endif %}
        </div>
        <button hx-delete="/projects/{{ project.id }}" hx-target="#project-list" hx-confirm="删除「{{ project.title }}」？"
                class="btn-icon" style="flex-shrink: 0; margin-left: 0.75rem;" title="删除项目">✕</button>
    </div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border-light);">
        <span style="font-size: 0.6875rem; color: var(--text-tertiary); letter-spacing: 0.02em;">{{ project.created_at.strftime('%Y-%m-%d') }}</span>
        <span style="font-size: 0.6875rem; color: var(--text-tertiary); text-transform: capitalize; letter-spacing: 0.02em;">{{ project.status }}</span>
    </div>
</div>
{% else %}
<div class="empty-state" style="grid-column: 1 / -1;">
    <span class="empty-state-icon">✎</span>
    <div class="empty-state-title">还没有项目</div>
    <p class="empty-state-desc" style="margin-top: 0.5rem;">点击右上角「新建项目」开始你的第一部小说</p>
</div>
{% endfor %}
