<div class="modal-overlay">
    <div class="modal-content" style="width: 100%; max-width: 420px; padding: 1.75rem;" onclick="event.stopPropagation()">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <h2 class="heading" style="margin: 0;">新建章节</h2>
            <button type="button" onclick="this.closest('.modal-overlay').remove()"
                    class="btn-icon">✕</button>
        </div>
        <form hx-post="/project/{{ project_id }}/writer/create" hx-target="#chapter-sidebar" hx-swap="innerHTML">
            <div style="margin-bottom: 1.5rem;">
                <label class="input-label">标题 *</label>
                <input type="text" name="title" required placeholder="章节标题" class="input">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button type="button" onclick="this.closest('.modal-overlay').remove()" class="btn btn-ghost">取消</button>
                <button type="submit" class="btn btn-primary">创建</button>
            </div>
        </form>
    </div>
</div>
