{% extends "base.html" %}
{% block title %}写作 - {{ project.title }}{% endblock %}
{% block content %}
<div style="display: flex; gap: 1.25rem; height: calc(100vh - 8rem);" class="animate-fade-in">

    <!-- Chapter Sidebar -->
    <div style="width: 260px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;">
        <div style="padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between;">
            <span style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary);">章节</span>
            <button hx-get="/project/{{ project.id }}/writer/new" hx-target="body" hx-swap="beforeend"
                    class="btn btn-ghost btn-sm">+ 新建</button>
        </div>
        <div id="chapter-sidebar" style="flex: 1; overflow-y: auto; padding: 0.5rem;">
            <div hx-get="/project/{{ project.id }}/writer/chapters" hx-trigger="load" hx-swap="innerHTML">
                <div style="text-align: center; color: var(--text-tertiary); font-size: 0.8125rem; padding: 1.5rem 0;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- Editor Area -->
    <div id="editor-area" style="flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow-y: auto; padding: 2rem 2.5rem; box-shadow: var(--shadow-sm);">
        <div style="text-align: center; color: var(--text-tertiary); padding: 4rem 0;" class="animate-fade-in">
            <p style="font-size: 1rem; font-weight: 500; font-family: var(--font-display); color: var(--text-secondary);">选择左侧章节开始写作</p>
            <p style="font-size: 0.8125rem; margin-top: 0.375rem;">或点击「新建」创建新章节</p>
        </div>
    </div>
</div>
{% endblock %}
