{% for ch in chapters %}
<div style="display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); font-size: 0.8125rem;"
     hx-get="/project/{{ project_id }}/writer/{{ ch.id }}" hx-target="#editor-area" hx-swap="innerHTML"
     onmouseover="this.style.backgroundColor='var(--bg-hover)'" onmouseout="this.style.backgroundColor='transparent'">
    <div style="flex: 1; min-width: 0;">
        <div class="truncate-line" style="font-weight: 500;">{{ ch.title or '无标题' }}</div>
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.125rem;">
            <span style="font-size: 0.625rem; color: var(--text-tertiary);">{{ ch.word_count }}字</span>
            <span style="font-size: 0.625rem; color: var(--text-tertiary); opacity: 0.5;">·</span>
            <span style="font-size: 0.625rem; color: var(--text-tertiary);">{{ ch.status }}</span>
        </div>
    </div>
    <button hx-delete="/project/{{ project_id }}/writer/{{ ch.id }}" hx-target="#chapter-sidebar"
            hx-confirm="删除该章节？"
            class="btn-icon" style="width: 22px; height: 22px; font-size: 0.5625rem; border: none; opacity: 0; flex-shrink: 0; transition: opacity var(--transition);"
            onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color=''">✕</button>
</div>
{% else %}
<p style="text-align: center; color: var(--text-tertiary); font-size: 0.8125rem; padding: 2rem 0.5rem; line-height: 1.6;">暂无章节</p>
{% endfor %}
