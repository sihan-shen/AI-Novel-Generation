{% extends "base.html" %}
{% block title %}审阅 - {{ project.title }}{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-bold">{{ project.title }}</h1>
        <p class="text-sm text-gray-500">自动审阅</p>
    </div>
    <button hx-get="/project/{{ project.id }}/review/new" hx-target="body" hx-swap="beforeend"
            class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 text-sm">
        + 发起审阅
    </button>
</div>
<div id="review-list" class="space-y-3"
     hx-get="/project/{{ project.id }}/review/list" hx-trigger="load" hx-swap="innerHTML">
    加载中...
</div>
{% endblock %}
