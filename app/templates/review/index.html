{% extends "base.html" %}
{% block title %}审阅 - {{ project.title }}{% endblock %}
{% block content %}
<div class="page-header animate-slide-up">
    <div>
        <h1 class="page-header-title">{{ project.title }}</h1>
        <p class="page-header-sub">自动审阅</p>
    </div>
    <div class="page-header-actions">
        <button hx-get="/project/{{ project.id }}/review/new" hx-target="body" hx-swap="beforeend"
                class="btn btn-primary">+ 发起审阅</button>
    </div>
</div>
<div id="review-list" class="space-y-3 stagger-children"
     hx-get="/project/{{ project.id }}/review/list" hx-trigger="load" hx-swap="innerHTML">
    加载中...
</div>
{% endblock %}
