{% for review in reviews %}
<div class="card-elevated animate-in animate-in-{{ loop.index if loop.index <= 6 else 6 }}" style="padding: 1rem;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <span style="font-weight: 500; font-size: 0.875rem;">{{ review.scope }}</span>
            <span style="font-size: 0.6875rem; color: var(--text-tertiary);">{{ review.created_at.strftime('%Y-%m-%d %H:%M') }}</span>
        </div>
        <span class="badge {% if review.status == 'pending' %}badge-warning{% else %}badge-success{% endif %}">
            {{ review.status }}
        </span>
    </div>
    {% if review.summary and review.summary != '{}' %}
    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem; line-height: 1.5;" class="clamp-2">{{ review.summary[:100] }}</div>
    {% endif %}
</div>
{% else %}
<div class="empty-state" style="grid-column: 1 / -1;">
    <span class="empty-state-icon">✅</span>
    <div class="empty-state-title">暂无审阅记录</div>
    <p class="empty-state-desc" style="margin-top: 0.375rem;">选择章节发起自动审阅</p>
</div>
{% endfor %}
