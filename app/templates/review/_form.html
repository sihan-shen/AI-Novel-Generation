<div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-xl" onclick="event.stopPropagation()">
        <h2 class="text-lg font-bold mb-4">发起审阅</h2>
        <form hx-post="/project/{{ project_id }}/review/run" hx-target="#review-list" hx-swap="innerHTML">
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">选择审阅范围</label>
                <select name="scope" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="instant">即时审阅（轻量）</option>
                    <option value="batch" selected>批量审阅（全量）</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">选择章节 *</label>
                <select name="chapter_id" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="">请选择...</option>
                    {% for ch in chapters %}
                    <option value="{{ ch.id }}">{{ ch.title }} ({{ ch.word_count }}字)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex justify-end gap-2">
                <button type="button" onclick="this.closest('#modal').remove()"
                        class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">取消</button>
                <button type="submit" class="px-4 py-2 text-sm bg-primary-600 text-white rounded-lg hover:bg-primary-700">
                    开始审阅
                </button>
            </div>
        </form>
    </div>
</div>
