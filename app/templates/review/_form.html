<div class="modal-overlay">
    <div class="modal-content" style="width: 100%; max-width: 440px; padding: 1.75rem;" onclick="event.stopPropagation()">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <h2 class="heading" style="margin: 0;">发起审阅</h2>
            <button type="button" onclick="this.closest('.modal-overlay').remove()"
                    class="btn-icon">✕</button>
        </div>
        <form hx-post="/project/{{ project_id }}/review/run" hx-target="#review-list" hx-swap="innerHTML">
            <div style="margin-bottom: 1rem;">
                <label class="input-label">选择审阅范围</label>
                <select name="scope" class="input">
                    <option value="instant">即时审阅（轻量）</option>
                    <option value="batch" selected>批量审阅（全量）</option>
                </select>
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label class="input-label">选择章节 *</label>
                <select name="chapter_id" required class="input">
                    <option value="">请选择...</option>
                    {% for ch in chapters %}
                    <option value="{{ ch.id }}">{{ ch.title }} ({{ ch.word_count }}字)</option>
                    {% endfor %}
                </select>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button type="button" onclick="this.closest('.modal-overlay').remove()" class="btn btn-ghost">取消</button>
                <button type="submit" class="btn btn-primary">开始审阅</button>
            </div>
        </form>
    </div>
</div>
