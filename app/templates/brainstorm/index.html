{% extends "base.html" %}
{% block title %}头脑风暴{% endblock %}
{% block content %}
<div style="display: flex; gap: 1.25rem; height: calc(100vh - 8rem);" class="animate-fade-in">

    <!-- Sidebar -->
    <div style="width: 260px; flex-shrink: 0; display: flex; flex-direction: column; gap: 0.75rem;">
        <button onclick="newSession()" class="btn btn-primary" style="justify-content: center; width: 100%; padding: 0.625rem;">
            + 新建对话
        </button>
        <div style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.375rem;"
             id="history-sidebar"
             hx-get="/brainstorm/history" hx-trigger="load" hx-swap="innerHTML">
            <div style="text-align: center; color: var(--text-tertiary); font-size: 0.8125rem; padding: 1.5rem 0;">加载中...</div>
        </div>
    </div>

    <!-- Chat Area -->
    <div style="flex: 1; display: flex; flex-direction: column; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm);">
        <!-- Chat Header -->
        <div style="padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 0.5rem;">
            <span style="font-family: var(--font-display); font-size: 0.9375rem; font-weight: 600; color: var(--text);">头脑风暴</span>
            <span style="font-size: 0.6875rem; color: var(--text-tertiary);">— AI 写作助手</span>
        </div>
        <!-- Messages -->
        <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem;">
            {% include "brainstorm/_chat.html" %}
        </div>
        <!-- Input Area -->
        <div style="border-top: 1px solid var(--border); padding: 0.75rem 1rem; background: var(--bg);">
            {% include "brainstorm/_input.html" %}
        </div>
        <!-- Save Bar -->
        <div id="save-bar" style="display: none; padding: 0.625rem 1rem; border-top: 1px solid var(--border-light); background: var(--bg-warm); justify-content: space-between; align-items: center;">
            <span style="font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.375rem;">
                <span style="opacity: 0.5;">✦</span> 将当前对话保存到项目
            </span>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <select id="save-project-select" class="input" style="width: auto; min-width: 160px; padding: 0.375rem 0.5rem; font-size: 0.75rem;">
                    <option value="">选择项目...</option>
                    {% for p in projects %}
                    <option value="{{ p.id }}">{{ p.title }}</option>
                    {% endfor %}
                </select>
                <button onclick="triggerExtract()" class="btn btn-primary" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">保存到项目</button>
            </div>
        </div>
    </div>
</div>

<script>
function scrollToBottom() {
    var el = document.getElementById('chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
}

function newSession() {
    sessionStorage.removeItem('brainstorm_messages');
    window.location.reload();
}

(function() {
    var msgs = JSON.parse(sessionStorage.getItem('brainstorm_messages') || '[]');
    if (msgs.length > 0) {
        var bar = document.getElementById('save-bar');
        if (bar) bar.style.display = 'flex';
    }
})();

// Auto-scroll to bottom when messages are restored from sessionStorage
(function() {
    var msgs = JSON.parse(sessionStorage.getItem('brainstorm_messages') || '[]');
    if (msgs.length > 0) {
        setTimeout(scrollToBottom, 100);
    }
})();

// Global HTMX listener: auto-scroll chat messages after swap
document.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.target && (evt.target.id === 'chat-messages' || evt.detail.target && evt.detail.target.id === 'chat-messages')) {
        setTimeout(scrollToBottom, 100);
    }
});

function triggerExtract() {
    var projectId = document.getElementById('save-project-select').value;
    if (!projectId) { alert('请选择目标项目'); return; }
    var messages = JSON.parse(sessionStorage.getItem('brainstorm_messages') || '[]');
    fetch('/brainstorm/extract', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages: messages, project_id: projectId}),
    })
    .then(function(r) { return r.text(); })
    .then(function(html) {
        document.body.insertAdjacentHTML('beforeend', html);
    });
}

function confirmSave() {
    var form = document.getElementById('save-form');
    if (!form) return;
    // data is injected by Jinja2 tojson filter as a JS variable
    var dataElement = document.getElementById('extract-data');
    if (!dataElement) return;
    var data = JSON.parse(dataElement.textContent);
    var selected = {settings: [], outlines: [], ideas: []};

    form.querySelectorAll('input[name="settings"]:checked').forEach(function(cb) {
        selected.settings.push(data.settings[parseInt(cb.value)]);
    });
    form.querySelectorAll('input[name="outlines"]:checked').forEach(function(cb) {
        selected.outlines.push(data.outlines[parseInt(cb.value)]);
    });
    form.querySelectorAll('input[name="ideas"]:checked').forEach(function(cb) {
        selected.ideas.push(data.ideas[parseInt(cb.value)]);
    });

    var projectId = document.getElementById('extract-project-id').textContent;
    var messages = JSON.parse(sessionStorage.getItem('brainstorm_messages') || '[]');

    fetch('/brainstorm/confirm-save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            project_id: projectId,
            data: selected,
            messages: messages,
        }),
    })
    .then(function(r) { return r.text(); })
    .then(function(html) {
        document.getElementById('extract-modal').innerHTML = html;
        if (typeof htmx !== 'undefined') {
            htmx.trigger('#history-sidebar', 'load');
        }
    });
}
</script>
{% endblock %}
