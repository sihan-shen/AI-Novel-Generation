{% if saved_sessions %}
    {% for s in saved_sessions %}
    <div class="card-elevated" style="padding: 0.625rem 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between;"
         hx-get="/brainstorm/history/{{ s.id }}" hx-target="#chat-messages" hx-swap="innerHTML">
        <div style="overflow: hidden; flex: 1;">
            <div style="font-size: 0.8125rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ s.title }}</div>
            <div style="font-size: 0.625rem; color: var(--text-tertiary); margin-top: 0.125rem;">{{ s.created_at.strftime('%m-%d %H:%M') }}</div>
        </div>
        <button hx-delete="/brainstorm/history/{{ s.id }}" hx-target="#history-sidebar" hx-swap="innerHTML"
                hx-confirm="删除该记录？"
                class="btn-icon" style="width: 24px; height: 24px; font-size: 0.625rem; flex-shrink: 0; border: none;"
                onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color=''">✕</button>
    </div>
    {% endfor %}
{% else %}
    <div style="text-align: center; color: var(--text-tertiary); font-size: 0.8125rem; padding: 2rem 0.5rem; line-height: 1.6;">
        暂无已保存的对话
    </div>
{% endif %}
