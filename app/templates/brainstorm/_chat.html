{% if messages and messages|length > 0 %}
    {% for m in messages %}
        {% if m.role != "system" %}
            {% with msg = m %}
                {% include "brainstorm/_message.html" %}
            {% endwith %}
        {% endif %}
    {% endfor %}
{% else %}
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-tertiary); text-align: center; padding: 3rem 2rem;" class="animate-fade-in">
        <div style="font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4;">💡</div>
        <p style="font-family: var(--font-display); font-size: 1.0625rem; font-weight: 500; color: var(--text-secondary);">开始头脑风暴</p>
        <p style="font-size: 0.8125rem; margin-top: 0.375rem; max-width: 300px; line-height: 1.6;">输入你的问题或想法，让 AI 帮你拓展思路、构建情节、打磨文字</p>
    </div>
{% endif %}
