{% for style in styles %}
<div class="card-elevated animate-in animate-in-{{ loop.index if loop.index <= 6 else 6 }}" style="padding: 1rem;">
    <div style="display: flex; align-items: flex-start; justify-content: space-between;">
        <div>
            <h3 class="heading-sm" style="margin: 0;">{{ style.name }}</h3>
            <p style="font-size: 0.6875rem; color: var(--text-tertiary); margin-top: 0.125rem;">{{ style.source }}</p>
        </div>
        <button hx-delete="/styles/{{ style.id }}" hx-target="#style-list"
                hx-confirm="删除文风「{{ style.name }}」？"
                class="btn-icon" style="width: 28px; height: 28px; font-size: 0.6875rem;"
                onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color=''">✕</button>
    </div>
    {% if style.analysis and style.analysis != '{}' %}
    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem; line-height: 1.5;" class="clamp-2">{{ style.analysis[:100] }}...</div>
    {% endif %}
</div>
{% else %}
<div class="empty-state" style="grid-column: 1 / -1;">
    <span class="empty-state-icon">✎</span>
    <div class="empty-state-title">暂无文风</div>
    <p class="empty-state-desc" style="margin-top: 0.375rem;">点击右上角「导入文风」开始</p>
</div>
{% endfor %}
