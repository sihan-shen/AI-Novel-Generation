<div id="modal" class="modal-overlay">
    <div class="modal-content" style="width: 100%; max-width: 600px; padding: 1.75rem;" onclick="event.stopPropagation()">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <h2 class="heading" style="margin: 0;">导入文风</h2>
            <button type="button" onclick="this.closest('#modal').remove()" class="btn-icon">✕</button>
        </div>
        <form hx-post="/styles/analyze-slices" hx-target="#slice-results" hx-swap="innerHTML">
            <div style="margin-bottom: 1rem;">
                <label class="input-label">文风名称</label>
                <input type="text" name="name" placeholder="如：村上春树冷峻都市风" class="input">
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label class="input-label">粘贴参考文本</label>
                <textarea name="text" rows="10" required
                          placeholder="粘贴作者的原文，LLM 将自动分析文风特征..."
                          class="input font-mono" style="font-size: 0.8125rem;"></textarea>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button type="button" onclick="this.closest('#modal').remove()"
                        class="btn btn-ghost">取消</button>
                <button type="submit" class="btn btn-primary">分析文风</button>
            </div>
        </form>
        <div id="slice-results" style="margin-top: 1rem;"></div>
    </div>
</div>
