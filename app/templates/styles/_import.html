<div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-2xl shadow-xl" onclick="event.stopPropagation()">
        <h2 class="text-lg font-bold mb-4">导入文风</h2>
        <form hx-post="/styles/analyze-slices" hx-target="#slice-results" hx-swap="innerHTML">
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">文风名称</label>
                <input type="text" name="name" placeholder="如：村上春树冷峻都市风"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">粘贴参考文本</label>
                <textarea name="text" rows="10" required
                          placeholder="粘贴作者的原文，LLM 将自动分析文风特征..."
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono"></textarea>
            </div>
            <div class="flex justify-between">
                <button type="button" onclick="this.closest('#modal').remove()"
                        class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">取消</button>
                <button type="submit" class="px-4 py-2 text-sm bg-primary-600 text-white rounded-lg hover:bg-primary-700">
                    分析文风
                </button>
            </div>
        </form>
        <div id="slice-results" class="mt-4"></div>
    </div>
</div>
