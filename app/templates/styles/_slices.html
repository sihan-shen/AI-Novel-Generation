{% if slices %}
<div class="mt-4 border-t pt-4">
    <h3 class="font-semibold text-sm mb-3">LLM 发现 {{ slices|length }} 个文风切片，请选择：</h3>
    <form hx-post="/styles/confirm-import" hx-target="#style-list" hx-swap="innerHTML"
          hx-on::after-request="document.getElementById('modal')?.remove()">
        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="source_text" value="{{ full_text }}">
        <div class="space-y-2 max-h-60 overflow-y-auto">
            {% for slice in slices %}
            <label class="flex items-start gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                <input type="radio" name="selected_text" value="{{ slice.text }}" {% if loop.first %}checked{% endif %}>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-medium bg-primary-100 text-primary-700 px-1.5 py-0.5 rounded">{{ slice.type }}</span>
                        <span class="text-xs text-amber-600">{{ '★' * slice.stars }}{{ '☆' * (5 - slice.stars) }}</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">{{ slice.reason }}</p>
                    <p class="text-xs text-gray-400 mt-1 line-clamp-2">{{ slice.text[:100] }}...</p>
                </div>
            </label>
            {% endfor %}
        </div>
        <div class="mt-3 flex justify-end gap-2">
            <button type="button" onclick="this.closest('#modal').remove()"
                    class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">取消</button>
            <button type="submit" class="px-4 py-2 text-sm bg-primary-600 text-white rounded-lg hover:bg-primary-700">
                确认导入
            </button>
        </div>
    </form>
</div>
{% else %}
<p class="text-sm text-gray-400 mt-3">文本过短或 LLM 分析失败，请尝试更长的文本。</p>
{% endif %}
