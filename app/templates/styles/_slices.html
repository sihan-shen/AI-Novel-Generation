{% if slices %}
<div style="border-top: 1px solid var(--border); padding-top: 1.25rem; margin-top: 0.5rem;">
    <p style="font-size: 0.8125rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.75rem;">
        LLM 发现 <strong style="color: var(--text);">{{ slices|length }}</strong> 个文风切片，请选择：
    </p>
    <form hx-post="/styles/confirm-import" hx-target="#style-list" hx-swap="innerHTML"
          hx-on::after-request="document.getElementById('modal')?.remove()">
        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="source_text" value="{{ full_text }}">
        <div style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 240px; overflow-y: auto; padding-right: 0.25rem;">
            {% for slice in slices %}
            <label style="display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: border-color var(--transition);"
                   onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor=''">
                <input type="radio" name="selected_text" value="{{ slice.text }}" {% if loop.first %}checked{% endif %} style="margin-top: 0.1875rem; accent-color: var(--accent);">
                <div style="flex: 1; min-width: 0;">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                        <span class="badge">{{ slice.type }}</span>
                        <span style="font-size: 0.6875rem; color: var(--warning);">{{ '★' * slice.stars }}{{ '☆' * (5 - slice.stars) }}</span>
                    </div>
                    <p style="font-size: 0.75rem; color: var(--text-secondary); line-height: 1.5;">{{ slice.reason }}</p>
                    <p style="font-size: 0.6875rem; color: var(--text-tertiary); margin-top: 0.25rem;" class="truncate-line">{{ slice.text[:100] }}...</p>
                </div>
            </label>
            {% endfor %}
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem;">
            <button type="button" onclick="this.closest('#modal').remove()"
                    class="btn btn-ghost">取消</button>
            <button type="submit" class="btn btn-primary">确认导入</button>
        </div>
    </form>
</div>
{% else %}
<p style="font-size: 0.8125rem; color: var(--text-tertiary); margin-top: 0.75rem; line-height: 1.6;">文本过短或 LLM 分析失败，请尝试更长的文本。</p>
{% endif %}
