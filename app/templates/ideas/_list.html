<script>
function dragStart(e) {
    e.dataTransfer.setData('text/plain', e.target.closest('[draggable]').dataset.id);
    e.dataTransfer.effectAllowed = 'move';
}
function allowDrop(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function drop(e) {
    e.preventDefault();
    var fromId = e.dataTransfer.getData('text/plain');
    var toEl = e.target.closest('[draggable]');
    if (!toEl || fromId === toEl.dataset.id) return;
    var container = document.getElementById('idea-list');
    var fromEl = container.querySelector('[data-id="' + fromId + '"]');
    if (fromEl) {
        if (fromEl.compareDocumentPosition(toEl) & 2) {
            toEl.parentNode.insertBefore(fromEl, toEl);
        } else {
            toEl.parentNode.insertBefore(fromEl, toEl.nextSibling);
        }
    }
    var items = container.querySelectorAll('[draggable]');
    var order = Array.from(items).map(function(el, i) { return {id: el.dataset.id, sort_order: i}; });
    fetch('/ideas/reorder', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({items: order}),
    });
}
</script>

{% for idea in ideas %}
<div class="card" style="padding:0.75rem;display:flex;align-items:flex-start;gap:0.5rem;" draggable="true"
     data-id="{{ idea.id }}"
     ondragstart="dragStart(event)" ondrop="drop(event)" ondragover="allowDrop(event)">
    <span style="cursor:grab;color:var(--text-tertiary);font-size:0.875rem;user-select:none;margin-top:0.125rem;">⠿</span>
    <div style="flex:1;min-width:0;">
        {% if idea.title %}<div style="font-weight:500;font-size:0.875rem;">{{ idea.title }}</div>{% endif %}
        <p style="font-size:0.8125rem;color:var(--text-secondary);margin-top:0.25rem;">{{ idea.content[:200] }}{% if idea.content|length > 200 %}...{% endif %}</p>
        <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.375rem;font-size:0.6875rem;color:var(--text-tertiary);">
            <span>{{ idea.source }}</span>
            <span>{{ idea.created_at.strftime('%m-%d') }}</span>
        </div>
    </div>
    <button hx-delete="/ideas/{{ idea.id }}" hx-target="#idea-list" hx-confirm="删除此便签？"
            style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:0.75rem;padding:0.25rem;flex-shrink:0;">✕</button>
</div>
{% else %}
<div style="text-align:center;padding:2rem;color:var(--text-tertiary);font-size:0.875rem;">
    暂无灵感便签
</div>
{% endfor %}
