{% for idea in ideas %}
<div class="card-elevated animate-in animate-in-{{ loop.index if loop.index <= 6 else 6 }}" style="padding: 1rem;">
    <div style="display: flex; align-items: flex-start; justify-content: space-between;">
        <div style="flex: 1; min-width: 0;">
            {% if idea.title %}<h3 class="heading-sm" style="margin: 0 0 0.25rem 0;">{{ idea.title }}</h3>{% endif %}
            <p style="font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.6;">{{ idea.content[:200] }}{% if idea.content|length > 200 %}...{% endif %}</p>
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-top: 0.5rem;">
                <span style="font-size: 0.625rem; color: var(--text-tertiary);">{{ idea.source }}</span>
                <span style="font-size: 0.625rem; color: var(--text-tertiary);">{{ idea.created_at.strftime('%m-%d') }}</span>
            </div>
        </div>
        <button hx-delete="/ideas/{{ idea.id }}" hx-target="#idea-list"
                hx-confirm="删除此便签？"
                class="btn-icon" style="width: 28px; height: 28px; font-size: 0.6875rem; flex-shrink: 0;"
                onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color=''">✕</button>
    </div>
</div>
{% else %}
<div class="empty-state" style="grid-column: 1 / -1;">
    <span class="empty-state-icon">💡</span>
    <div class="empty-state-title">暂无灵感便签</div>
    <p class="empty-state-desc" style="margin-top: 0.375rem;">点击右上角开始记录</p>
</div>
{% endfor %}
