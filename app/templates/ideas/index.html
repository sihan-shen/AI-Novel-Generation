{% extends "base.html" %}
{% block title %}灵感便签{% endblock %}
{% block content %}
<div class="page-header animate-slide-up">
    <div>
        <h1 class="page-header-title">灵感便签</h1>
        <p class="page-header-sub">随时记录闪光的念头</p>
    </div>
    <div class="page-header-actions">
        <button onclick="document.getElementById('idea-modal').classList.remove('hidden')"
                class="btn btn-primary">+ 新便签</button>
    </div>
</div>

<div id="idea-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 stagger-children"
     hx-get="/ideas/list" hx-trigger="load" hx-swap="innerHTML">
    加载中...
</div>

<!-- New idea modal -->
<div id="idea-modal" class="hidden modal-overlay">
    <div class="modal-content" style="width: 100%; max-width: 480px; padding: 1.75rem;" onclick="event.stopPropagation()">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <h2 class="heading" style="margin: 0;">新灵感便签</h2>
            <button type="button" onclick="document.getElementById('idea-modal').classList.add('hidden')" class="btn-icon">✕</button>
        </div>
        <form hx-post="/ideas/create" hx-target="#idea-list" hx-swap="innerHTML">
            <div style="margin-bottom: 1rem;">
                <label class="input-label">标题（可选）</label>
                <input type="text" name="title" placeholder="给灵感取个名字" class="input">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label class="input-label">内容</label>
                <textarea name="content" rows="4" placeholder="记录你的灵感..." class="input"></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button type="button" onclick="document.getElementById('idea-modal').classList.add('hidden')"
                        class="btn btn-ghost">取消</button>
                <button type="submit" class="btn btn-primary"
                        onclick="setTimeout(function(){ document.getElementById('idea-modal').classList.add('hidden') }, 100)">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
