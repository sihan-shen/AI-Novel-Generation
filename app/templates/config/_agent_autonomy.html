<h3 class="heading-sm" style="margin:1.5rem 0 1rem 0;">Agent 自主写作配置</h3>

<form hx-post="/config/agent-autonomy" hx-target="#agent-autonomy-result" class="config-form">
  <div class="form-group" style="margin-bottom:1rem;">
    <label class="input-label">里程碑粒度</label>
    <select name="milestone_granularity" class="input">
      <option value="chapter">章级 — 每章完成后汇报</option>
      <option value="volume" selected>卷级 — 每卷完成后汇报</option>
      <option value="act">幕级 — 完整目标后汇报</option>
    </select>
  </div>

  <div class="form-group" style="margin-bottom:1rem;">
    <label class="input-label">干预阈值</label>
    <select name="intervention_threshold" class="input">
      <option value="all">每决策确认 — 所有重要操作都请求确认</option>
      <option value="conflict_only" selected>仅矛盾时暂停 — 仅在发现冲突或低分时暂停</option>
      <option value="never">从不暂停 — Agent 自行完成全部</option>
    </select>
  </div>

  <div class="form-group" style="margin-bottom:1rem;">
    <label class="input-label">写入模式</label>
    <select name="write_mode" class="input">
      <option value="suggest">只建议不写入 — Agent 生成建议，手动确认生效</option>
      <option value="draft" selected>写草稿 — Agent 写入草稿，可编辑后发布</option>
      <option value="direct">直接写入 — Agent 直接写入正式数据</option>
    </select>
  </div>

  <div class="form-group" style="margin-bottom:1rem;">
    <label class="input-label">最大重写轮次</label>
    <input type="number" name="max_rewrite_rounds" value="3" min="0" max="10" class="input" style="width:80px;">
  </div>

  <div class="form-group" style="margin-bottom:1rem;">
    <label class="input-label">单次任务 Token 预算</label>
    <input type="number" name="token_budget" value="100000" min="10000" max="1000000" step="10000" class="input" style="width:120px;">
  </div>

  <button type="submit" class="btn btn-primary">保存配置</button>
  <div id="agent-autonomy-result" style="margin-top:0.5rem;"></div>
</form>
