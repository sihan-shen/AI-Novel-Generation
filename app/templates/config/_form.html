{% if saved %}
<div style="margin-bottom: 1rem; padding: 0.625rem 1rem; background: rgba(90, 143, 106, 0.08); color: var(--success); border-radius: var(--radius-sm); font-size: 0.8125rem; border: 1px solid rgba(90, 143, 106, 0.15);">配置已保存</div>
{% endif %}

<div style="margin-bottom: 1rem;">
    <label class="input-label">LLM 提供商</label>
    <select name="llm_provider" id="provider-select" onchange="onProviderChange(this.value)"
            class="input">
        {% for pid, info in providers.items() %}
        <option value="{{ pid }}" {% if cfg.llm_provider == pid %}selected{% endif %}
                data-has-key="{{ 'true' if info.needs_api_key else 'false' }}"
                data-has-url="{{ 'true' if info.needs_base_url else 'false' }}"
                data-has-list="{{ 'true' if info.has_model_list_api else 'false' }}"
                data-key-label="{{ info.api_key_label }}"
                data-url-label="{{ info.base_url_label }}"
                data-url-placeholder="{{ info.base_url_placeholder }}">
            {{ info.label }}
        </option>
        {% endfor %}
    </select>
</div>

<div id="api-key-area" style="margin-bottom: 1rem;">
    <label class="input-label" id="api-key-label">API Key</label>
    <input type="password" name="api_key" value="{{ cfg.api_key }}" class="input" placeholder="输入 API Key">
    <p style="font-size: 0.6875rem; color: var(--text-tertiary); margin-top: 0.25rem;">留空则使用 .env 中的值（如有）</p>
</div>

<div id="base-url-area" style="margin-bottom: 1rem;{% if cfg.llm_provider not in ('ollama', 'custom') %}display:none{% endif %}">
    <label class="input-label" id="base-url-label">API 地址</label>
    <input type="text" name="base_url" value="{{ cfg.base_url }}" class="input" placeholder="" id="base-url-input">
</div>

<div style="margin-bottom: 1.5rem;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.375rem;">
        <label class="input-label" style="margin-bottom: 0;">模型</label>
        <button type="button" id="fetch-models-btn" style="display:none"
                hx-get="/config/fetch-models" hx-target="#model-list"
                class="btn btn-ghost btn-sm">
            从 API 获取列表
        </button>
    </div>
    <div id="model-list">
        {% include "config/_model_list.html" %}
    </div>
    <p style="font-size: 0.6875rem; color: var(--text-tertiary); margin-top: 0.25rem;">可直接输入自定义模型名称</p>
</div>

<div style="border-top: 1px solid var(--border); padding-top: 1rem; display: flex; justify-content: flex-end;">
    <button type="submit" class="btn btn-primary">保存配置</button>
</div>

<script>
function onProviderChange(pid) {
    var opt = document.querySelector('#provider-select option[value="' + pid + '"]');
    var hasKey = opt.dataset.hasKey === 'true';
    var hasUrl = opt.dataset.hasUrl === 'true';
    var hasList = opt.dataset.hasList === 'true';
    var keyLabel = opt.dataset.keyLabel;
    var urlLabel = opt.dataset.urlLabel;
    var urlPlaceholder = opt.dataset.urlPlaceholder;

    document.getElementById('api-key-area').style.display = hasKey ? '' : 'none';
    document.getElementById('api-key-label').textContent = keyLabel;

    document.getElementById('base-url-area').style.display = hasUrl ? '' : 'none';
    if (hasUrl) {
        document.getElementById('base-url-label').textContent = urlLabel;
        document.getElementById('base-url-input').placeholder = urlPlaceholder;
    }

    document.getElementById('fetch-models-btn').style.display = hasList ? '' : 'none';
}
</script>
