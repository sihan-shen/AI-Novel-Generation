{% if saved %}
<div class="mb-4 px-4 py-2 bg-green-50 text-green-700 rounded-lg text-sm border border-green-200">配置已保存</div>
{% endif %}

<div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">LLM 提供商</label>
    <select name="llm_provider"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500">
        <option value="claude" {% if cfg.llm_provider == 'claude' %}selected{% endif %}>Claude (Anthropic)</option>
        <option value="openai" {% if cfg.llm_provider == 'openai' %}selected{% endif %}>OpenAI</option>
    </select>
</div>

<div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Claude API Key</label>
    <input type="password" name="claude_api_key" value="{{ cfg.claude_api_key }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500"
           placeholder="sk-ant-...">
    <p class="text-xs text-gray-400 mt-1">留空则使用 .env 中的值</p>
</div>

<div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Claude 模型</label>
    <select name="claude_model"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500">
        <option value="claude-sonnet-4-6" {% if cfg.claude_model == 'claude-sonnet-4-6' %}selected{% endif %}>Claude Sonnet 4.6</option>
        <option value="claude-opus-4-7" {% if cfg.claude_model == 'claude-opus-4-7' %}selected{% endif %}>Claude Opus 4.7</option>
        <option value="claude-haiku-4-5-20251001" {% if cfg.claude_model == 'claude-haiku-4-5-20251001' %}selected{% endif %}>Claude Haiku 4.5</option>
    </select>
</div>

<div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">OpenAI API Key</label>
    <input type="password" name="openai_api_key" value="{{ cfg.openai_api_key }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500"
           placeholder="sk-...">
</div>

<div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">OpenAI 模型</label>
    <select name="openai_model"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500">
        <option value="gpt-4o" {% if cfg.openai_model == 'gpt-4o' %}selected{% endif %}>GPT-4o</option>
        <option value="gpt-4o-mini" {% if cfg.openai_model == 'gpt-4o-mini' %}selected{% endif %}>GPT-4o Mini</option>
    </select>
</div>

<div class="border-t pt-4 flex justify-end">
    <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 text-sm">
        保存配置
    </button>
</div>
